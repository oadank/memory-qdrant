<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qdrant 记忆管理器</title>
    <style>
        :root {
            --primary-color: #409eff;
            --success-color: #67c23a;
            --warning-color: #e6a23c;
            --danger-color: #f56c6c;
            --info-color: #909399;
            --background-color: #f5f7fa;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-primary: #303133;
            --text-secondary: #606266;
            --text-placeholder: #c0c4cc;
            --border-color: #dcdfe6;
            --header-height: 60px;
            --controls-height: 60px;
            --footer-height: 120px;
        }

        .dark-mode {
            --background-color: #1a1a1a;
            --sidebar-bg: #2d2d2d;
            --card-bg: #2d2d2d;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --text-placeholder: #666666;
            --border-color: #444444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
        }

        .header {
            height: var(--header-height);
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .health-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--success-color);
        }

        .health-indicator {
            width: 8px;
            height: 8px;
            background-color: var(--success-color);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 12px;
        }

        .theme-btn:hover {
            background-color: var(--background-color);
            transform: scale(1.1);
        }

        .content {
            flex: 1;
            padding-top: calc(var(--header-height) + var(--controls-height));
            padding-bottom: var(--footer-height);
            overflow-y: auto;
        }

        .controls {
            height: var(--controls-height);
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px; /* 减少内边距 */
            position: fixed;
            top: var(--header-height);
            left: 0;
            right: 0;
            z-index: 999;
            min-width: 800px; /* 设置最小宽度防止换行 */
        }

        .left-controls {
            display: flex;
            align-items: center;
            gap: 10px; /* 减少间距 */
        }

        .right-controls {
            display: flex;
            align-items: center;
            gap: 10px; /* 减少间距 */
        }

        .btn {
            padding: 6px 12px; /* 减小按钮内边距 */
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px; /* 减少图标和文字间距 */
            font-size: 12px; /* 减小字体 */
            transition: all 0.3s;
            white-space: nowrap; /* 防止换行 */
        }

        .btn:hover {
            background-color: var(--background-color);
        }

        .btn-danger {
            background-color: var(--danger-color);
            color: white;
            border-color: var(--danger-color);
        }

        .btn-danger:hover {
            opacity: 0.9;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .page-size-selector {
            padding: 5px 10px; /* 减小选择器内边距 */
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-primary);
            font-size: 12px; /* 减小字体 */
            min-width: 80px; /* 固定宽度 */
        }

        .refresh-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 12px;
        }

        .refresh-btn:hover {
            background-color: var(--background-color);
            transform: rotate(360deg);
        }

        .delete-input {
            padding: 5px 10px; /* 减小输入框内边距 */
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-secondary);
            font-size: 12px; /* 减小字体 */
            min-width: 80px; /* 设置最小宽度 */
        }

        .delete-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .delete-input:disabled {
            background-color: #f5f7fa;
            cursor: not-allowed;
        }

        .search-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-box {
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-primary);
            font-size: 12px;
            min-width: 120px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 4px;
            background-color: var(--success-color);
            color: white;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            z-index: 2000;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
        }

        .notification.show {
            opacity: 1;
            transform: translateY(0);
        }

        .notification.error {
            background-color: var(--danger-color);
        }

        .chat-container {
            padding: 20px;
            width: 100%;
            max-width: none;
            margin: 0;
        }

        .chat-messages {
            display: grid;
            grid-template-columns: 50px 1fr 50px;
            gap: 5px;
            min-height: calc(100vh - var(--header-height) - var(--controls-height) - 120px);
            padding-bottom: 20px;
        }

        .message-index-left, .message-index-right {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            padding-top: 18px;
            align-self: start;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            position: relative;
        }

        .message-actions {
            position: absolute;
            top: 8px;
            right: 8px; /* 放在消息框的右上角 */
            display: none;
            gap: 5px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 4px;
            padding: 2px;
            z-index: 100;
        }

        .message:hover .message-actions {
            display: flex;
        }

        .action-btn {
            width: 24px;
            height: 24px;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-secondary);
            z-index: 101;
        }

        .action-btn:hover {
            background-color: var(--border-color);
            color: var(--text-primary);
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
            min-width: 0;
            position: relative; /* 为操作按钮提供定位上下文 */
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .message-time {
            color: var(--text-secondary);
        }

        .message-text {
            background-color: var(--card-bg);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            white-space: pre-wrap;
            word-wrap: break-word;
            position: relative;
            display: inline-block;
            max-width: 100%;
            min-width: 120px;
            min-height: 38px;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
        }

        .message.assistant {
            flex-direction: row;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message.user .message-content {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .message.user .message-header {
            flex-direction: row-reverse;
        }

        .message.user .message-text {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            max-width: fit-content;
            text-align: right;
        }

        .message.insight {
            flex-direction: row-reverse;
        }

        .message.insight .message-content {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .message.insight .message-header {
            flex-direction: row-reverse;
        }

        .message.insight .message-text {
            background-color: #e3f2fd;
            color: #1976d2;
            border-color: #bbdefb;
            max-width: fit-content;
            text-align: right;
        }

        .footer {
            height: var(--footer-height);
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            padding: 15px 20px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-box {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--card-bg);
            color: var(--text-primary);
            resize: none;
            min-height: 60px;
        }

        .insert-btn {
            padding: 8px 12px; /* 减小按钮内边距 */
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-primary);
            cursor: pointer;
            white-space: nowrap;
            font-size: 12px; /* 减小字体 */
        }

        .stats {
            text-align: right;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 16px;
            color: var(--text-secondary);
        }

        .error {
            background-color: #fef0f0;
            color: #f56c6c;
            padding: 10px 15px;
            border-radius: 4px;
            margin: 10px;
            border: 1px solid #fde2e2;
        }

        /* 响应式设计：在小屏幕上隐藏部分元素 */
        @media (max-width: 1024px) {
            .controls {
                min-width: 700px; /* 小屏幕上的最小宽度 */
                padding: 0 10px;
            }

            .btn {
                padding: 5px 10px;
                font-size: 11px;
            }

            .page-size-selector, .delete-input, .search-box {
                font-size: 11px;
                min-width: 70px;
            }

            .refresh-btn {
                width: 26px;
                height: 26px;
            }
        }

        @media (max-width: 800px) {
            .controls {
                min-width: 600px;
                flex-wrap: nowrap; /* 防止换行 */
            }

            .btn span {
                display: none; /* 在极小屏幕上只显示图标 */
            }

            .btn {
                padding: 6px;
                min-width: auto;
            }

            .message-actions {
                right: 5px; /* 在小屏幕上调整操作按钮位置 */
            }
        }

        @media (min-width: 1400px) {
            .chat-messages {
                grid-template-columns: 80px 1fr 80px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo">Qdrant 记忆管理器</div>
            <div class="health-status">
                <div class="health-indicator"></div>
                <span>服务器已连接</span>
            </div>
        </div>
        <div class="theme-toggle">
            <button class="theme-btn" title="跟随系统" onclick="setTheme('auto')">💻</button>
            <button class="theme-btn" title="亮色" onclick="setTheme('light')">☀️</button>
            <button class="theme-btn" title="暗色" onclick="setTheme('dark')">🌙</button>
        </div>
    </div>

    <div class="controls">
        <div class="left-controls">
            <button class="btn btn-danger" onclick="deleteAllMemories()">🗑️全部</button>
            <input type="text" class="delete-input" id="batchDeleteInput" placeholder="1-5" oninput="validateBatchDelete()">
            <button class="btn btn-danger" id="batchDeleteBtn" onclick="batchDelete()" disabled>批量删</button>
        </div>
        <div class="right-controls">
            <select class="page-size-selector" onchange="changePageSize(this.value)">
                <option value="20">20条</option>
                <option value="50" selected>50条</option>
                <option value="100">100条</option>
            </select>
            <div class="search-container">
                <input type="text" class="search-box" id="searchBox" placeholder="搜索记忆..." oninput="searchMemories()">
                <button class="btn" onclick="searchMemories()">🔍搜索</button>
            </div>
            <button class="btn btn-danger" onclick="deleteCurrentPage()">🗑️本页</button>
            <button class="refresh-btn" onclick="loadMemories()">🔄</button>
            <button class="btn btn-primary" onclick="triggerSummary()">📊总结</button>
        </div>
    </div>

    <div class="content">
        <div class="chat-container">
            <div id="loading" class="loading">加载记忆中...</div>
            <div id="error" class="error" style="display: none;"></div>
            <div id="chatMessages" class="chat-messages"></div>
        </div>
    </div>

    <div class="footer">
        <div class="input-area">
            <textarea id="inputBox" class="input-box" placeholder="输入要插入的记忆内容..."></textarea>
            <button class="insert-btn" onclick="insertMemory()">插入记忆</button>
        </div>
        <div class="stats" id="stats">共 0 条信息（记忆 0 条 + 精华 0 条）</div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        // 配置信息
        const CONFIG = {
            apiUrl: "http://localhost:3001",
            qdrantUrl: "http://localhost:6333",
            collection: "agent_memory",
            pageSize: 50,
            currentPage: 1
        };

        let currentState = {
            allMemories: [],
            filteredMemories: [],
            theme: 'auto',
            searchQuery: ''
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadTheme();
            loadMemories();
        });

        // 显示通知
        function showNotification(message, isError = false) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'notification';
            if (isError) {
                notification.classList.add('error');
            }

            // 显示通知
            setTimeout(() => {
                notification.classList.add('show');
            }, 10);

            // 3秒后隐藏
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // 加载主题
        function loadTheme() {
            const savedTheme = localStorage.getItem('memory-manager-theme') || 'auto';
            setTheme(savedTheme);
        }

        // 设置主题
        function setTheme(theme) {
            currentState.theme = theme;
            localStorage.setItem('memory-manager-theme', theme);

            const html = document.documentElement;
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (theme === 'dark' || (theme === 'auto' && prefersDark)) {
                html.classList.add('dark-mode');
            } else {
                html.classList.remove('dark-mode');
            }
        }

        // 格式化时间
        function formatTime(timestamp) {
            if (!timestamp) return "未知时间";

            let date;
            if (typeof timestamp === 'number' || /^\d+$/.test(timestamp)) {
                const numTimestamp = parseInt(timestamp);
                // 检查是毫秒还是秒时间戳
                date = new Date(numTimestamp.toString().length > 10 ? numTimestamp : numTimestamp * 1000);
            } else {
                date = new Date(timestamp);
            }

            if (isNaN(date.getTime())) return timestamp.toString();

            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 解析范围字符串（如 "1-5" 或 "1,2,3"）
        function parseRangeString(rangeStr) {
            if (!rangeStr || typeof rangeStr !== 'string') return [];

            // 替换中文逗号和减号为英文
            rangeStr = rangeStr.replace(/，/g, ',').replace(/－/g, '-');

            // 检查是否包含逗号或连字符
            if (rangeStr.includes(',')) {
                // 解析逗号分隔的数字
                return rangeStr.split(',')
                    .map(s => parseInt(s.trim()))
                    .filter(n => !isNaN(n))
                    .sort((a, b) => a - b);
            } else if (rangeStr.includes('-')) {
                // 解析范围 (如 1-5)
                const parts = rangeStr.split('-');
                if (parts.length !== 2) return [];

                const start = parseInt(parts[0].trim());
                const end = parseInt(parts[1].trim());

                if (isNaN(start) || isNaN(end) || start > end) return [];

                const result = [];
                for (let i = start; i <= end; i++) {
                    result.push(i);
                }
                return result.sort((a, b) => a - b);
            } else {
                // 单个数字
                const num = parseInt(rangeStr.trim());
                if (isNaN(num)) return [];
                return [num];
            }
        }

        // 验证批量删除输入
        function validateBatchDelete() {
            const input = document.getElementById('batchDeleteInput');
            const button = document.getElementById('batchDeleteBtn');
            const rangeStr = input.value.trim();

            if (!rangeStr) {
                button.disabled = true;
                return;
            }

            const parsed = parseRangeString(rangeStr);
            button.disabled = parsed.length === 0;
        }

        // 批量删除
        async function batchDelete() {
            const input = document.getElementById('batchDeleteInput');
            const rangeStr = input.value.trim();

            if (!rangeStr) {
                showNotification('请输入要删除的序号', true);
                return;
            }

            const indices = parseRangeString(rangeStr);
            if (indices.length === 0) {
                showNotification('输入格式不合法，请使用数字、逗号或连字符（如: 1,2,3 或 1-5）', true);
                return;
            }

            if (!confirm(`确定要删除序号为 ${rangeStr} 的记忆吗？此操作不可撤销！`)) {
                return;
            }

            // 获取当前显示的有序记忆列表
            const sortedMemories = [...currentState.allMemories].sort((a, b) => {
                const timeA = a.payload?.timestamp ? new Date(a.payload.timestamp).getTime() : 0;
                const timeB = b.payload?.timestamp ? new Date(b.payload.timestamp).getTime() : 0;
                return timeB - timeA;
            });

            try {
                // 按降序删除，避免索引错位
                for (let i = indices.length - 1; i >= 0; i--) {
                    const idx = indices[i] - 1; // 用户输入从1开始，数组从0开始
                    if (idx >= 0 && idx < sortedMemories.length) {
                        const memoryId = sortedMemories[idx].id;
                        await apiRequest(`/api/memory/${memoryId}`, null, 'DELETE');
                    }
                }

                input.value = ''; // 清空输入框
                loadMemories(); // 重新加载
                showNotification(`成功删除 ${indices.length} 条记忆`);
            } catch (err) {
                showNotification(`批量删除失败: ${err.message}`, true);
            }
        }

        // 删除本页
        async function deleteCurrentPage() {
            if (!confirm('确定要删除当前页的所有记忆吗？此操作不可撤销！')) {
                return;
            }

            // 获取当前显示的有序记忆列表
            const sortedMemories = [...currentState.allMemories].sort((a, b) => {
                const timeA = a.payload?.timestamp ? new Date(a.payload.timestamp).getTime() : 0;
                const timeB = b.payload?.timestamp ? new Date(b.payload.timestamp).getTime() : 0;
                return timeB - timeA;
            });

            try {
                // 删除所有当前记忆
                for (const memory of sortedMemories) {
                    await apiRequest(`/api/memory/${memory.id}`, null, 'DELETE');
                }

                loadMemories(); // 重新加载
                showNotification(`成功删除 ${sortedMemories.length} 条记忆`);
            } catch (err) {
                showNotification(`删除本页失败: ${err.message}`, true);
            }
        }

        // 搜索记忆
        function searchMemories() {
            const searchBox = document.getElementById('searchBox');
            const query = searchBox.value.trim().toLowerCase();

            if (!query) {
                // 如果搜索框为空，显示所有记忆
                displayMemories(currentState.allMemories);
                return;
            }

            // 过滤包含搜索词的记忆
            const filteredMemories = currentState.allMemories.filter(memory => {
                const text = memory.payload?.text || '';
                return text.toLowerCase().includes(query);
            });

            displayMemories(filteredMemories, query);
        }

        // 显示记忆
        function displayMemories(memories, searchQuery = '') {
            const chatMessages = document.getElementById('chatMessages');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');

            loading.style.display = 'none';
            error.style.display = 'none';

            if (!memories || memories.length === 0) {
                chatMessages.innerHTML = '<div class="message-index-left"></div><div style="grid-column: 2; text-align: center; padding: 40px; color: var(--text-secondary);">暂无记忆记录</div><div class="message-index-right"></div>';
                updateStats([]);
                return;
            }

            // 按时间排序（最新的在前）
            const sortedMemories = [...memories].sort((a, b) => {
                const timeA = a.payload?.timestamp ? new Date(a.payload.timestamp).getTime() : 0;
                const timeB = b.payload?.timestamp ? new Date(b.payload.timestamp).getTime() : 0;
                return timeB - timeA;
            });

            // 渲染消息，包含左右序号
            let htmlContent = '';
            sortedMemories.forEach((memory, index) => {
                const payload = memory.payload || {};
                const role = payload.role || 'assistant';
                const memType = payload.mem_type || 'fact';
                const formattedTime = formatTime(payload.timestamp);

                // 高亮搜索词
                let displayText = escapeHtml(payload.text || '');
                if (searchQuery) {
                    const regex = new RegExp(`(${searchQuery})`, 'gi');
                    displayText = displayText.replace(regex, '<span class="highlight">$1</span>');
                }

                let avatar, name, className;

                if (memType === 'insight') {
                    avatar = '💡';
                    name = '精华';
                    className = 'insight';
                } else if (role === 'user') {
                    avatar = '👤';
                    name = '用户';
                    className = 'user';
                } else {
                    avatar = '🤖';
                    name = '助手';
                    className = 'assistant';
                }

                htmlContent += `
                    <div class="message-index-left">${index + 1}</div>
                    <div class="message ${className}" data-id="${memory.id}">
                        <div class="message-actions">
                            <button class="action-btn" title="复制" onclick="copyMessage('${escapeHtml(payload.text || '')}')">⧉</button>
                            <button class="action-btn" title="删除" onclick="deleteSingleMessage('${memory.id}', '${name}')">×</button>
                        </div>
                        <div class="message-avatar">${avatar}</div>
                        <div class="message-content">
                            <div class="message-header">
                                <span class="message-name">${name}</span>
                                <span class="message-time">${formattedTime}</span>
                            </div>
                            <div class="message-text">${displayText}</div>
                        </div>
                    </div>
                    <div class="message-index-right">${index + 1}</div>
                `;
            });

            chatMessages.innerHTML = htmlContent;
            updateStats(memories);
        }

        // 删除单条消息
        async function deleteSingleMessage(id, name) {
            if (!confirm(`确定要删除这条${name}记忆吗？此操作不可撤销！`)) {
                return;
            }

            try {
                await apiRequest(`/api/memory/${id}`, null, 'DELETE');
                loadMemories(); // 重新加载
                showNotification('记忆删除成功');
            } catch (err) {
                showNotification(`删除记忆失败: ${err.message}`, true);
            }
        }

        // 复制消息内容
        function copyMessage(text) {
            navigator.clipboard.writeText(text).then(function() {
                // 简单的视觉反馈
                showNotification('已复制到剪贴板');
            }).catch(function(err) {
                // 降级处理，如果 Clipboard API 不可用
                const textArea = document.createElement('textarea');
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showNotification('已复制到剪贴板');
            });
        }

        // 更新统计信息
        function updateStats(memories) {
            const stats = document.getElementById('stats');
            const total = memories.length || 0;
            const facts = memories.filter(m => m.payload?.mem_type === 'fact').length || 0;
            const insights = memories.filter(m => m.payload?.mem_type === 'insight').length || 0;

            stats.textContent = `共 ${total} 条信息（记忆 ${facts} 条 + 精华 ${insights} 条）`;
        }

        // 转义HTML
        function escapeHtml(text) {
            if (typeof text !== 'string') return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\n/g, "<br>");
        }

        // API请求
        async function apiRequest(endpoint, data = null, method = 'GET') {
            const url = `${CONFIG.apiUrl}${endpoint}`;

            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json'
                }
            };

            if (data) {
                options.body = JSON.stringify(data);
            }

            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.error('API请求失败:', error);
                throw error;
            }
        }

        // 加载记忆
        async function loadMemories() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const searchBox = document.getElementById('searchBox');

            loading.style.display = 'block';
            error.style.display = 'none';

            try {
                const response = await apiRequest('/api/memory');
                currentState.allMemories = response.memories || [];

                // 如果当前有搜索查询，保持搜索状态
                if (searchBox && searchBox.value.trim()) {
                    searchMemories();
                } else {
                    displayMemories(currentState.allMemories);
                }
            } catch (err) {
                showError(`加载记忆失败: ${err.message}`);
            } finally {
                loading.style.display = 'none';
            }
        }

        // 显示错误
        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.style.display = 'block';

            setTimeout(() => {
                error.style.display = 'none';
            }, 5000);
        }

        // 删除全部记忆
        async function deleteAllMemories() {
            if (!confirm('确定要删除全部记忆吗？此操作不可撤销！')) {
                return;
            }

            try {
                await apiRequest('/api/memory/all', null, 'DELETE');
                loadMemories();
                showNotification('全部记忆删除成功');
            } catch (err) {
                showNotification(`删除全部记忆失败: ${err.message}`, true);
            }
        }

        // 插入记忆
        async function insertMemory() {
            const inputBox = document.getElementById('inputBox');
            const text = inputBox.value.trim();

            if (!text) {
                showNotification('请输入要插入的记忆内容', true);
                return;
            }

            try {
                const response = await apiRequest('/api/memory', {
                    text: text,
                    type: 'insight',
                    role: 'assistant'
                }, 'POST');

                showNotification(`记忆插入成功！ID: ${response.id}`);
                inputBox.value = '';
                loadMemories();
            } catch (err) {
                showNotification(`插入记忆失败: ${err.message}`, true);
            }
        }

        // 触发总结
        async function triggerSummary() {
            if (!confirm('确定要触发手动总结吗？')) {
                return;
            }

            try {
                const response = await apiRequest('/api/summary', {}, 'POST');
                showNotification(response.message || '总结任务已触发');
            } catch (err) {
                showNotification(`触发总结失败: ${err.message}`, true);
            }
        }

        // 改变页面大小
        function changePageSize(value) {
            CONFIG.pageSize = parseInt(value);
            loadMemories(); // 自动刷新页面
        }

        // 监听主题变化
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (currentState.theme === 'auto') {
                setTheme('auto');
            }
        });

        // 添加键盘快捷键
        document.addEventListener('keydown', function(e) {
            // Ctrl+F 聚焦到搜索框
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                document.getElementById('searchBox')?.focus();
            }

            // ESC 清除搜索
            if (e.key === 'Escape') {
                const searchBox = document.getElementById('searchBox');
                if (searchBox === document.activeElement) {
                    searchBox.value = '';
                    searchMemories();
                }
            }
        });
    </script>
</body>
</html>
