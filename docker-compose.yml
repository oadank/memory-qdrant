# OpenClaw 三层记忆服务
# 使用：docker compose up -d

services:
  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: memory-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/healthz || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # PostgreSQL + Apache AGE 知识图谱
  postgres:
    image: apache/age:release_PG15_1.6.0
    container_name: memory-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: openclaw123
      POSTGRES_DB: jarvis_memory
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Memory Server (原生 Node.js HTTP 服务器)
  memory-server:
    build:
      context: ./server
      dockerfile: docker/Dockerfile
    container_name: memory-server
    ports:
      - "7777:7777"
    environment:
      OPENCLAW_MEMORY_TIER: full
      MEMORY_AUTH_TOKEN: clawx-memory-token
      QDRANT_URL: http://qdrant:6333
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: openclaw
      PGPASSWORD: openclaw123
      PGDATABASE: jarvis_memory
      AGE_GRAPH: agent_memory
      # Ollama 嵌入配置
      OPENCLAW_MEMORY_EMBEDDING__ENABLED: "true"
      OPENCLAW_MEMORY_EMBEDDING__PROVIDER: ollama
      OPENCLAW_MEMORY_EMBEDDING__MODEL: bge-m3:latest
      OPENCLAW_MEMORY_EMBEDDING__BASE_URL: http://172.24.16.1:11434
      OPENCLAW_MEMORY_EMBEDDING__DIMENSIONS: "1024"
      OPENCLAW_MEMORY_EMBEDDING__API_KEY: ollama
      # 实体提取配置（需要 LLM）
      OPENCLAW_MEMORY_EXTRACTION__ENABLED: "true"  # 暂时关闭，需要配置 LLM API
      OPENCLAW_MEMORY_EXTRACTION__PROVIDER: ollama
      OPENCLAW_MEMORY_EXTRACTION__MODEL: qwen2.5:14b-instruct
      OPENCLAW_MEMORY_EXTRACTION__BASE_URL: http://172.24.16.1:11434/v1
      OPENCLAW_MEMORY_EXTRACTION__API_KEY: ollama
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # 记忆管理器网页服务（Docker 版本）
  memory-web:
    build:
      context: ./server
      dockerfile: Dockerfile.web
    container_name: memory-web
    ports:
      - "3001:3001"
    volumes:
      - ./server/frontend:/app/frontend
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://172.24.16.1:11434
    depends_on:
      - memory-server
      - qdrant
    extra_hosts:
      - "172.24.16.1:host-gateway"
    restart: unless-stopped

volumes:
  qdrant_storage:
  postgres_data:
